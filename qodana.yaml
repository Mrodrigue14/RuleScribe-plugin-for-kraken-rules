version: "1.0"

# Qodana Community for JVM : l'analyseur statique de JetBrains. Complémentaire
# de CodeQL plutôt que redondant — CodeQL analyse du Java/Kotlin générique,
# Qodana connaît les API de l'IntelliJ Platform et signale les usages
# incorrects propres au développement de plugins.
linter: jetbrains/qodana-jvm-community:latest

profile:
  name: qodana.recommended

# L'image Qodana 2026.1 embarque un JDK 25, que Gradle 8.14.5 ne sait pas
# interpréter (« Could not determine java version from '25.0.3' ») : l'import
# Gradle échouait donc dans le conteneur, laissant l'analyse sans modèle de
# types résolu. On impose le JDK 17, celui de la toolchain du projet.
projectJDK: "17"

# Résout les dépendances (dont le SDK IntelliJ) AVANT l'analyse. Sans cela,
# Qodana ouvre le projet sans pouvoir typer les API de la plateforme et déclare
# inatteignables des corps de méthode qui ne le sont pas : le premier run avait
# produit 76 faux positifs « KotlinUnreachableCode », soit 92 % du bruit total.
bootstrap: ./gradlew classes

# Le parseur de src/main/gen est généré par Grammar-Kit depuis le BNF : ses
# avertissements ne sont pas actionnables, on ne corrige pas du code généré.
# Même exclusion que pour la couverture Kover et le SARIF CodeQL.
exclude:
  - name: All
    paths:
      - src/main/gen
