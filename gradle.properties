# La stdlib Kotlin est fournie par la plateforme IntelliJ
kotlin.stdlib.default.dependency=false
kotlin.code.style=official
org.gradle.jvmargs=-Xmx2048m
# Cache de build : réutilise les sorties de tâches inchangées (local et CI —
# le cache Gradle est persisté entre les runs par gradle/actions/setup-gradle)
org.gradle.caching=true
