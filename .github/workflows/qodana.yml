name: Qodana

# Analyse statique JetBrains (Qodana Community for JVM). Complémentaire de
# CodeQL : celui-ci analyse du Java/Kotlin générique, Qodana connaît les API de
# l'IntelliJ Platform et remonte les mauvais usages propres aux plugins.
# Les résultats partent dans GitHub code scanning, aux côtés de CodeQL et
# poutine — aucun compte Qodana Cloud n'est requis.
#
# Déclencheurs : `main` et hebdomadaire, PAS sur chaque PR. Les PRs sont déjà
# gardées par CodeQL et les tests (checks requis) ; ce qui compte ici est de
# tenir à jour l'état de la branche par défaut dans l'onglet Security, sans
# rallonger le délai de chaque PR avec une seconde analyse lourde.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qodana:
    name: Qodana (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # fetch-depth: 0 — Qodana rattache ses résultats à l'historique.
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Java + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1.3
        with:
          # On n'échoue pas le workflow sur des findings : Qodana est ici en
          # complément d'information, pas en portail bloquant. La porte
          # bloquante reste CodeQL + les tests, exigés par la protection de
          # branche. Les résultats restent visibles dans l'onglet Security.
          fail-threshold: ""
          upload-result: true
          post-pr-comment: false
          use-caches: true

      - name: Upload du SARIF Qodana
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          category: qodana
