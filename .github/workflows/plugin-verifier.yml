name: Compatibilité IntelliJ (Plugin Verifier)

# Vérifie la compatibilité binaire du plugin contre plusieurs versions
# d'IntelliJ (API supprimées/dépréciées) via le Plugin Verifier officiel de
# JetBrains. Si une nouvelle version d'IntelliJ casse une API utilisée par le
# plugin, une issue est ouverte automatiquement avec le détail.
#
# Lourd (télécharge chaque IDE ~1 Go) → seulement planifié + manuel, jamais
# sur chaque push.
on:
  schedule:
    - cron: '0 3 * * 6'   # samedi 03:00 UTC
  workflow_dispatch:
    inputs:
      ide_versions:
        description: "Versions IntelliJ à vérifier (ex. IC-2024.1.7,IC-2025.1). Vide = liste par défaut."
        required: false
        default: ""

# Permissions minimales : lecture du dépôt + écriture d'issues pour l'alerte.
permissions:
  contents: read
  issues: write

jobs:
  verify:
    name: Plugin Verifier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (avec cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Plugin Verifier
        id: verify
        # La liste de versions est passée par une variable d'environnement puis
        # référencée comme variable shell ("$IDE_VERSIONS") : jamais interpolée
        # via ${{ }} dans le script (pas d'injection de commande).
        env:
          IDE_VERSIONS: ${{ github.event.inputs.ide_versions || 'IC-2024.1.7,IC-2024.3,IC-2025.1' }}
        run: |
          set -o pipefail
          ./gradlew runPluginVerifier -PpluginVerifierIdeVersions="$IDE_VERSIONS" 2>&1 | tee verifier-output.txt

      - name: Publier le rapport du verifier
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-verifier-report
          path: |
            verifier-output.txt
            build/reports/pluginVerifier/

      - name: Ouvrir/mettre à jour une issue si incompatibilité
        if: failure() && steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try { report = fs.readFileSync('verifier-output.txt', 'utf8'); } catch (e) {}
            const tail = report.slice(-4000);
            const label = 'intellij-compat';
            const title = "Plugin Verifier : incompatibilité IntelliJ détectée";
            const body = [
              "Le Plugin Verifier a détecté une incompatibilité binaire avec une version",
              "d'IntelliJ (API supprimée ou modifiée). Un correctif du code du plugin est",
              "probablement nécessaire.",
              "",
              `Run : ${process.env.RUN_URL}`,
              "",
              "<details><summary>Sortie du verifier (fin)</summary>",
              "",
              "```",
              tail,
              "```",
              "</details>",
            ].join("\n");
            const { owner, repo } = context.repo;
            // Anti-doublon : réutilise une issue ouverte portant le label.
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: "open", labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.data[0].number,
                body: `Nouvelle détection.\n\nRun : ${process.env.RUN_URL}`,
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }
